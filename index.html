<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Générateur de Citations Aléatoires</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Playfair+Display:ital,wght@0,700;1,700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="/src/style.css">
  </head>
  <body class="bg-gray-50 transition-colors duration-1000 ease-in-out font-sans overflow-hidden">
    <!-- Atmospheric background elements -->
    <div class="fixed inset-0 -z-10 overflow-hidden pointer-events-none">
      <div id="bg-glow-1" class="absolute top-[20%] left-[10%] w-[500px] h-[500px] bg-purple-200/40 rounded-full blur-[100px] transition-colors duration-[2000ms]"></div>
      <div id="bg-glow-2" class="absolute bottom-[20%] right-[10%] w-[600px] h-[600px] bg-blue-200/30 rounded-full blur-[120px] transition-colors duration-[2000ms]"></div>
    </div>

    <!-- Main Container -->
    <main class="min-h-screen flex items-center justify-center p-6 sm:p-12">
      <div id="quote-card" class="w-full max-w-2xl bg-white/70 backdrop-blur-xl border border-white/40 rounded-[32px] p-8 sm:p-12 shadow-[0_32px_64px_-16px_rgba(0,0,0,0.1)] opacity-0 translate-y-8 transition-all duration-700 ease-out">
        
        <!-- Loader -->
        <div id="loader" class="flex flex-col items-center justify-center py-12 space-y-4">
          <div class="w-10 h-10 border-4 border-gray-200 border-t-indigo-600 rounded-full animate-spin"></div>
          <p class="text-sm font-medium text-gray-500 uppercase tracking-widest">Chargement...</p>
        </div>

        <!-- Content (Hidden while loading) -->
        <div id="content" class="hidden flex flex-col items-center text-center space-y-10">
          <!-- Quote Area -->
          <div class="space-y-6">
            <div id="quote-icon-container" class="opacity-20 animate-pulse">
              <i data-lucide="quote" class="w-10 h-10 mx-auto text-gray-900"></i>
            </div>
            
            <div class="relative min-h-[140px] flex items-center justify-center">
              <p id="quote-text" class="text-3xl sm:text-4xl md:text-5xl font-bold font-serif italic leading-tight text-gray-900 transition-opacity duration-300">
                <!-- Text injected here -->
              </p>
            </div>

            <div class="flex items-center justify-center space-x-3">
              <div class="h-px w-8 bg-gray-300"></div>
              <p id="quote-author" class="text-lg font-medium text-gray-600 tracking-wide transition-opacity duration-300">
                <!-- Author injected here -->
              </p>
              <div class="h-px w-8 bg-gray-300"></div>
            </div>
          </div>

          <!-- Buttons Section -->
          <div class="w-full pt-8 flex flex-col sm:flex-row items-center justify-between gap-6 border-t border-gray-200/50">
            <!-- Share Buttons -->
            <div class="flex items-center gap-3">
              <button id="share-twitter" title="Partager sur X" class="w-12 h-12 flex items-center justify-center rounded-full bg-black text-white hover:scale-110 transition-transform cursor-pointer">
                <i data-lucide="twitter" class="w-5 h-5"></i>
              </button>
              <button id="share-whatsapp" title="Partager sur WhatsApp" class="w-12 h-12 flex items-center justify-center rounded-full bg-green-500 text-white hover:scale-110 transition-transform cursor-pointer">
                <i data-lucide="message-circle" class="w-5 h-5"></i>
              </button>
              <button id="share-facebook" title="Partager sur Facebook" class="w-12 h-12 flex items-center justify-center rounded-full bg-blue-600 text-white hover:scale-110 transition-transform cursor-pointer">
                <i data-lucide="facebook" class="w-5 h-5"></i>
              </button>
              <button id="share-instagram" title="Ouvrir Instagram" class="w-12 h-12 flex items-center justify-center rounded-full bg-gradient-to-tr from-yellow-400 via-red-500 to-purple-600 text-white hover:scale-110 transition-transform cursor-pointer">
                <i data-lucide="instagram" class="w-5 h-5"></i>
              </button>
              <button id="copy-clipboard" title="Copier" class="w-12 h-12 flex items-center justify-center rounded-full bg-gray-100 text-gray-600 hover:bg-gray-200 transition-all cursor-pointer">
                <i data-lucide="copy" class="w-5 h-5"></i>
              </button>
            </div>

            <!-- Main Action -->
            <button id="new-quote-btn" class="group relative px-8 py-4 bg-gray-900 text-white rounded-2xl font-semibold overflow-hidden transition-all hover:pr-12 cursor-pointer shadow-lg hover:shadow-gray-900/20 active:scale-95">
              <span class="relative z-10">Nouvelle citation</span>
              <i data-lucide="arrow-right" class="absolute right-4 top-1/2 -translate-y-1/2 w-5 h-5 opacity-0 group-hover:opacity-100 transition-all"></i>
            </button>
          </div>
        </div>

        <!-- Success Message Toast (hidden) -->
        <div id="toast" class="fixed top-8 left-1/2 -translate-x-1/2 flex items-center space-x-2 bg-gray-900 text-white px-6 py-3 rounded-full text-sm font-medium opacity-0 translate-y-[-20px] transition-all pointer-events-none z-50">
          <i data-lucide="check" class="w-4 h-4 text-green-400"></i>
          <span>Citation copiée !</span>
        </div>
      </div>
    </main>

    <script type="module" src="/src/script.js"></script>
  </body>
</html>
